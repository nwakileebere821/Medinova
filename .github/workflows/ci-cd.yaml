name: Medinova CI Pipeline (Docker → ECR)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: medinova

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # STEP 2: Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # STEP 3: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # STEP 4: Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY .

      # STEP 5: Tag image for ECR
      - name: Tag Docker Image
        run: |
          docker tag medinova:latest 318689657850.dkr.ecr.us-east-1.amazonaws.com/medinova:latest

      # STEP 6: Push image to ECR
      - name: Push Image to Amazon ECR
        run: |
          docker push 318689657850.dkr.ecr.us-east-1.amazonaws.com/medinova:latest